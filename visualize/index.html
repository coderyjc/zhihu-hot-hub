<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>知乎热榜热度观察台</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="shell">
      <header class="masthead">
        <div>
          <p class="eyebrow">zhihu-hot-hub / visualize</p>
          <h1>知乎热榜热度观察台</h1>
        </div>
        <div class="status-strip" id="statusStrip">
          <span class="status-dot"></span>
          <span id="statusText">正在载入索引</span>
        </div>
      </header>

      <main class="workspace">
        <aside class="date-rail" aria-label="日期列表">
          <div class="rail-head">
            <h2>日期</h2>
            <span id="dateCount">0</span>
          </div>
          <div class="date-list" id="dateList"></div>
        </aside>

        <section class="board">
          <div class="toolbar">
            <div>
              <p class="selected-date" id="selectedDate">未选择日期</p>
              <p class="meta-line" id="selectedMeta">等待数据</p>
            </div>
            <div class="controls">
              <input id="searchInput" type="search" placeholder="搜索话题" autocomplete="off">
              <select id="sortSelect" aria-label="排序方式">
                <option value="rank">按最新排名</option>
                <option value="heat">按最新热度</option>
                <option value="history">按轨迹点数</option>
              </select>
            </div>
          </div>

          <div class="summary-grid" id="summaryGrid">
            <div class="metric">
              <span>话题数</span>
              <strong id="topicCount">0</strong>
            </div>
            <div class="metric">
              <span>最高热度</span>
              <strong id="maxHeat">--</strong>
            </div>
            <div class="metric">
              <span>轨迹点</span>
              <strong id="historyCount">0</strong>
            </div>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>排名</th>
                  <th>话题</th>
                  <th>最新热度</th>
                  <th>热度值</th>
                  <th>轨迹</th>
                  <th>首次出现</th>
                  <th>最后出现</th>
                </tr>
              </thead>
              <tbody id="topicRows"></tbody>
            </table>
            <div class="empty-state" id="emptyState" hidden>暂无匹配话题</div>
          </div>
        </section>
      </main>
    </div>

    <div class="drawer-backdrop" id="drawerBackdrop" hidden></div>
    <aside class="drawer" id="detailDrawer" aria-hidden="true" aria-label="话题详情">
      <div class="drawer-head">
        <div>
          <p class="eyebrow" id="drawerRank">话题详情</p>
          <h2 id="drawerTitle">未选择话题</h2>
        </div>
        <button class="close-button" id="closeDrawer" type="button" aria-label="关闭">×</button>
      </div>
      <div class="drawer-actions">
        <a id="topicLink" href="#" target="_blank" rel="noreferrer">打开知乎</a>
        <button class="ghost-button active" id="dailyTrackButton" type="button">当天轨迹</button>
        <button class="ghost-button" id="globalTrackButton" type="button">全局轨迹</button>
      </div>
      <div class="chart-panel">
        <div class="chart-head">
          <span id="chartTitle">热度变化</span>
          <span id="chartRange">--</span>
        </div>
        <svg id="heatChart" role="img" aria-label="热度变化折线图"></svg>
      </div>
      <ol class="history-list" id="historyList"></ol>
    </aside>

    <template id="dateTemplate">
      <button class="date-item" type="button">
        <span class="date-value"></span>
        <span class="date-meta"></span>
      </button>
    </template>

    <template id="rowTemplate">
      <tr>
        <td class="rank-cell"></td>
        <td class="title-cell"></td>
        <td class="heat-cell"></td>
        <td class="value-cell"></td>
        <td class="history-cell"></td>
        <td class="first-cell"></td>
        <td class="last-cell"></td>
      </tr>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
